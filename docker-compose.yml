services:
  postgres:
    image: postgres:16-alpine
    container_name: lexfinance-postgres
    environment:
      POSTGRES_DB: lexfinance
      POSTGRES_USER: lexfinance
      POSTGRES_PASSWORD: lexfinance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
